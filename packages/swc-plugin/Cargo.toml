[package]
authors = ["Braydon Jones <braydon.jones28@gmail.com>"]
description = "SWC plugin for harmony.ai"
edition = "2021"
license = "Apache-2.0"
name = "harmony-plugin"
publish = false
version = "0.4.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
once_cell = "1.19.0"
regex = "1.10.6"
serde = "1.0.207"
serde_json = "1.0.125"
tracing = { version = "0.1.37", features = ["release_max_level_off"] }
swc_core = { version = "45.0.2", features = [
  "ecma_plugin_transform",
  "ecma_utils",
  "ecma_visit",
  "ecma_ast",
  "ecma_parser",
  "common",
  "testing_transform",
] }
base64 = "0.21.7"
pathdiff = "0.1.0"
fancy-regex = "0.13.0"
console_error_panic_hook = "0.1.7"
path-slash = "0.2.1"

[dev-dependencies]
